<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Receipt paper -->
  <g transform="translate(120, 80)">
    <rect x="8" y="40" width="260" height="320" rx="12" fill="white" opacity="0.95"/>
    <!-- Top fold -->
    <path d="M8 52 Q140 68 268 52 L268 40 Q140 56 8 40 Z" fill="#E5E7EB"/>
    <!-- Lines -->
    <rect x="28" y="80" width="120" height="10" rx="5" fill="#D1D5DB"/>
    <rect x="28" y="105" width="200" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="28" y="125" width="160" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="28" y="145" width="180" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="28" y="165" width="100" height="8" rx="4" fill="#E5E7EB"/>
    <!-- Divider -->
    <line x1="28" y1="195" x2="240" y2="195" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Amount rows -->
    <rect x="28" y="220" width="70" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="180" y="220" width="60" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="28" y="245" width="90" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="180" y="245" width="60" height="8" rx="4" fill="#E5E7EB"/>
    <!-- Total line -->
    <line x1="28" y1="275" x2="240" y2="275" stroke="#9CA3AF" stroke-width="2"/>
    <rect x="28" y="295" width="80" height="10" rx="5" fill="url(#accent)"/>
    <rect x="150" y="295" width="80" height="10" rx="5" fill="#3B82F6"/>
  </g>
</svg>