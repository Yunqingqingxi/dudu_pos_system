<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1E40AF" stroke-width="4" opacity="0.3"/>

  <!-- Receipt / invoice paper -->
  <g transform="translate(160, 110)">
    <!-- Paper body -->
    <rect x="0" y="30" width="180" height="260" rx="8" fill="white" opacity="0.95"/>
    <!-- Paper header fold -->
    <path d="M0 38 Q90 50 180 38 L180 30 Q90 42 0 30 Z" fill="#E5E7EB"/>
    <!-- Lines on receipt -->
    <rect x="20" y="65" width="80" height="8" rx="4" fill="#D1D5DB"/>
    <rect x="20" y="85" width="140" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="100" width="100" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="115" width="120" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="130" width="60" height="6" rx="3" fill="#E5E7EB"/>
    <!-- Divider -->
    <line x1="20" y1="155" x2="160" y2="155" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Amount rows -->
    <rect x="20" y="175" width="50" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="120" y="175" width="40" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="195" width="70" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="120" y="195" width="40" height="6" rx="3" fill="#E5E7EB"/>
    <!-- Bottom total line -->
    <line x1="20" y1="220" x2="160" y2="220" stroke="#9CA3AF" stroke-width="2"/>
    <rect x="20" y="235" width="60" height="7" rx="3.5" fill="url(#accent)"/>
    <rect x="100" y="235" width="55" height="7" rx="3.5" fill="#3B82F6"/>
  </g>

  <!-- "DD" text mark -->
  <g transform="translate(256, 400)">
    <text text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">
      嘟嘟
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="110" cy="160" r="6" fill="white" opacity="0.4"/>
  <circle cx="110" cy="190" r="6" fill="white" opacity="0.3"/>
  <circle cx="110" cy="220" r="6" fill="white" opacity="0.2"/>
</svg>